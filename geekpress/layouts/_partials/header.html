<header class="sticky top-0 z-50 border-b border-slate-200 bg-white/80 backdrop-blur">
  <input type="checkbox" id="nav-toggle" class="peer sr-only" />
  <div class="mx-auto flex h-16 max-w-6xl items-center justify-between px-6">
    <a class="flex items-center gap-2.5 font-extrabold text-ink" href="{{ "/" | relURL }}">
      {{ partial "logo-img.html" . }}
      <span class="text-lg">{{ site.Params.brand.name }}</span>
    </a>

    <nav class="hidden items-center gap-8 md:flex" aria-label="Primary">
      {{ range site.Menus.main }}
        <a class="text-sm font-medium text-ink transition-colors hover:text-brand-500" href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
      {{ with site.Params.header }}
        <a class="inline-flex items-center justify-center rounded-full bg-brand-500 px-5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-brand-500/25 transition hover:bg-brand-600" href="{{ .cta_url | relURL }}">{{ .cta_text }}</a>
      {{ end }}
    </nav>

    <label for="nav-toggle" class="inline-flex h-10 w-10 cursor-pointer items-center justify-center rounded-lg text-ink md:hidden" aria-label="Toggle menu">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </label>
  </div>

  <div class="hidden border-t border-slate-200 bg-white peer-checked:block md:hidden">
    <nav class="mx-auto flex max-w-6xl flex-col px-6 py-2" aria-label="Mobile">
      {{ range site.Menus.main }}
        <a class="border-b border-slate-100 py-3 text-base font-medium text-ink last:border-0" href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
      {{ with site.Params.header }}
        <a class="my-3 inline-flex items-center justify-center rounded-full bg-brand-500 px-5 py-3 text-base font-semibold text-white" href="{{ .cta_url | relURL }}">{{ .cta_text }}</a>
      {{ end }}
    </nav>
  </div>
</header>
