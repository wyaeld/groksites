{{ define "main" }}
<section class="page-hero">
  <div class="container">
    {{ with .Params.eyebrow }}<span class="eyebrow">{{ . }}</span>{{ end }}
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="lede">{{ . }}</p>{{ end }}
    {{ with .Params.heroImage }}
      <div class="page-hero-img">
        <img src="{{ . }}" alt="{{ $.Title }}">
      </div>
    {{ end }}
  </div>
</section>

<section class="page-body">
  <div class="container narrow">
    {{ .Content }}
  </div>
</section>
{{ end }}
