{{ define "main" }}
<section class="bg-gradient-to-b from-brand-50 to-white">
  <div class="mx-auto max-w-2xl px-6 py-16 text-center sm:py-20">
    {{ with .Params.eyebrow }}<span class="inline-block text-sm font-bold uppercase tracking-widest text-brand-500">{{ . }}</span>{{ end }}
    <h1 class="mt-3 text-4xl font-extrabold tracking-tight text-ink sm:text-5xl">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="mx-auto mt-5 max-w-xl text-lg text-slate-600">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="bg-white pb-24">
  <div class="mx-auto max-w-xl px-6">
    {{ with .Params.form }}
    <div id="form-success" class="hidden rounded-2xl border border-brand-100 bg-brand-50 p-8 text-center">
      <h2 class="text-2xl font-bold text-ink">{{ .success_heading }}</h2>
      <p class="mt-2 text-slate-600">{{ .success_body }}</p>
    </div>

    <form
      id="contact-form"
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      class="grid gap-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-xl shadow-slate-200/60 sm:p-8"
    >
      <input type="hidden" name="form-name" value="contact" />
      <p class="hidden">
        <label>Don't fill this out if you're human: <input name="bot-field" /></label>
      </p>

      <label class="grid gap-1.5 text-sm font-semibold text-ink">
        {{ .name_label }}
        <input type="text" name="name" required placeholder="{{ .name_placeholder }}"
          class="rounded-lg border border-slate-300 px-3.5 py-2.5 font-normal text-ink placeholder:text-slate-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
      </label>

      <label class="grid gap-1.5 text-sm font-semibold text-ink">
        {{ .email_label }}
        <input type="email" name="email" required placeholder="{{ .email_placeholder }}"
          class="rounded-lg border border-slate-300 px-3.5 py-2.5 font-normal text-ink placeholder:text-slate-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
      </label>

      <label class="grid gap-1.5 text-sm font-semibold text-ink">
        {{ .service_label }}
        <select name="service" required
          class="rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 font-normal text-ink focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30">
          <option value="" disabled selected>{{ .service_default }}</option>
          {{ range .services }}
            <option value="{{ . }}">{{ . }}</option>
          {{ end }}
        </select>
      </label>

      <label class="grid gap-1.5 text-sm font-semibold text-ink">
        {{ .goal_label }}
        <textarea name="goal" rows="5" required placeholder="{{ .goal_placeholder }}"
          class="rounded-lg border border-slate-300 px-3.5 py-2.5 font-normal text-ink placeholder:text-slate-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30"></textarea>
      </label>

      <button type="submit"
        class="mt-1 inline-flex items-center justify-center rounded-full bg-brand-500 px-6 py-3.5 text-base font-semibold text-white shadow-lg shadow-brand-500/25 transition hover:bg-brand-600">
        {{ .submit_text }}
      </button>

      {{ with $.Params.note }}<p class="text-center text-sm text-slate-500">{{ . }}</p>{{ end }}
    </form>
    {{ end }}
  </div>
</section>

<script>
  (function () {
    var form = document.getElementById("contact-form");
    if (!form) return;
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var data = new URLSearchParams(new FormData(form)).toString();
      fetch("/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: data,
      })
        .then(function () {
          form.classList.add("hidden");
          document.getElementById("form-success").classList.remove("hidden");
          window.scrollTo({ top: 0, behavior: "smooth" });
        })
        .catch(function () {
          form.submit();
        });
    });
  })();
</script>
{{ end }}
