<header class="sticky top-0 z-50 bg-white/90 backdrop-blur">
  <div class="svc-stripe h-1.5" aria-hidden="true"></div>
  <input type="checkbox" id="nav-toggle" class="peer sr-only" />
  <div class="mx-auto flex h-16 max-w-6xl items-center justify-between gap-4 border-b border-slate-200 px-5 sm:px-6">
    <a class="flex items-center" href="{{ "/" | relURL }}" aria-label="{{ site.Params.brand.name }} home">
      {{ partial "logo-img.html" . }}
    </a>

    <nav class="hidden items-center gap-7 lg:flex" aria-label="Primary">
      {{ range site.Menus.main }}
        <a class="text-sm font-semibold uppercase tracking-wide text-ink transition-colors hover:text-brand-500" href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
      {{ with site.Params.contact }}
        <a class="inline-flex items-center gap-2 rounded-md bg-signal-500 px-4 py-2.5 text-sm font-bold uppercase tracking-wide text-white shadow-sm transition hover:bg-signal-600" href="tel:{{ .phone_tel }}">
          <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.5 11.5 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.57a1 1 0 0 1-.24 1.02l-2.21 2.2Z"/></svg>
          {{ site.Params.header.cta_text }}
        </a>
      {{ end }}
    </nav>

    <label for="nav-toggle" class="inline-flex h-10 w-10 cursor-pointer items-center justify-center rounded-md text-ink lg:hidden" aria-label="Toggle menu">
      <svg class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </label>
  </div>

  <div class="hidden border-b border-slate-200 bg-white peer-checked:block lg:hidden">
    <nav class="mx-auto flex max-w-6xl flex-col px-5 py-2 sm:px-6" aria-label="Mobile">
      {{ range site.Menus.main }}
        <a class="border-b border-slate-100 py-3.5 text-base font-semibold uppercase tracking-wide text-ink last:border-0" href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
      {{ with site.Params.contact }}
        <a class="my-3 inline-flex items-center justify-center gap-2 rounded-md bg-signal-500 px-5 py-3.5 text-base font-bold uppercase tracking-wide text-white" href="tel:{{ .phone_tel }}">
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24 11.5 11.5 0 0 0 3.57.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.57a1 1 0 0 1-.24 1.02l-2.21 2.2Z"/></svg>
          {{ site.Params.header.cta_text }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
