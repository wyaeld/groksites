<header class="sticky top-0 z-40 border-b border-navy/8 bg-foam/95 backdrop-blur-md">
  <div class="container-page">
    <div class="flex h-16 items-center justify-between gap-3 sm:h-[4.25rem]">
      <a href="{{ "/" | relURL }}#main" class="group flex min-w-0 items-center gap-2.5">
        <img
          src="{{ "images/logo.webp" | relURL }}"
          alt=""
          width="512"
          height="256"
          class="h-9 w-auto sm:h-10">
        <span class="min-w-0">
          <span class="block font-display text-base font-extrabold leading-tight text-navy sm:text-lg">
            Mr Waterbed <span class="text-teal">NZ</span>
          </span>
        </span>
      </a>

      <nav class="hidden items-center gap-0.5 sm:flex" aria-label="Primary">
        <a href="{{ "/" | relURL }}#waterbeds" class="nav-link">Waterbeds</a>
        <a href="{{ "/" | relURL }}#services" class="nav-link">Services</a>
        <a href="{{ "/" | relURL }}#contact" class="nav-link">Contact</a>
      </nav>

      <div class="flex items-center gap-2">
        <a href="{{ .Site.Params.phoneHref | safeURL }}" class="btn-primary !px-3 !py-2 text-sm sm:!px-4 sm:!py-2.5">
          <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <span class="hidden sm:inline">{{ .Site.Params.phone }}</span>
          <span class="sm:hidden">Call</span>
        </a>
        <button type="button"
                id="nav-toggle"
                class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-navy/12 text-navy transition-colors hover:bg-teal-soft/50 sm:hidden"
                aria-controls="mobile-nav"
                aria-expanded="false"
                aria-label="Open menu">
          <svg id="icon-open" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16"/>
          </svg>
          <svg id="icon-close" class="hidden h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div id="mobile-nav" class="hidden border-t border-navy/8 bg-foam sm:hidden" hidden>
    <nav class="container-page flex flex-col gap-1 py-3" aria-label="Mobile">
      <a href="{{ "/" | relURL }}#waterbeds" class="rounded-xl px-3 py-3 text-base font-semibold text-navy hover:bg-teal-soft/50">Waterbeds</a>
      <a href="{{ "/" | relURL }}#services" class="rounded-xl px-3 py-3 text-base font-semibold text-navy hover:bg-teal-soft/50">Services</a>
      <a href="{{ "/" | relURL }}#contact" class="rounded-xl px-3 py-3 text-base font-semibold text-navy hover:bg-teal-soft/50">Contact</a>
      <a href="{{ "/" | relURL }}#story" class="rounded-xl px-3 py-3 text-base font-semibold text-navy hover:bg-teal-soft/50">My story</a>
      <a href="{{ "/" | relURL }}#how-they-work" class="rounded-xl px-3 py-3 text-base font-semibold text-navy hover:bg-teal-soft/50">How they work</a>
      <a href="{{ .Site.Params.emailHref }}" class="rounded-xl px-3 py-3 text-base font-semibold text-teal">
        {{ .Site.Params.email }}
      </a>
    </nav>
  </div>
</header>
