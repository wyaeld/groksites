[build]
  command = "npm run build"
  publish = "public"
  # Skip this site's build when the commit only touches other monorepo paths.
  # Base dir is mrwaterbed on the Netlify project, so "." is this site folder.
  # Empty CACHED_COMMIT_REF (first deploy / cache miss) must not skip the build.
  ignore = "if [ -z \"$CACHED_COMMIT_REF\" ]; then exit 1; fi; git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF ."

[build.environment]
  HUGO_VERSION = "0.164.0"
  NODE_VERSION = "22"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Old multi-page URLs → single-page sections
[[redirects]]
  from = "/our-beds"
  to = "/#waterbeds"
  status = 301

[[redirects]]
  from = "/our-beds/"
  to = "/#waterbeds"
  status = 301

